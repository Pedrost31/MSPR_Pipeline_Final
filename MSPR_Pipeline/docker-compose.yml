version: "3.9"

services:

  # ── Base de données ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: healthai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthai
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/api_schema.sql:/docker-entrypoint-initdb.d/02_api_schema.sql:ro
      - ./database/03_seed_admin.sql:/docker-entrypoint-initdb.d/03_seed_admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthai -d healthai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Pipeline ETL (manuel ou debug) ───────────────────────
  pipeline:
    build: .
    container_name: healthai-pipeline
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      PYTHONPATH: /app
    command: python scripts/run_pipeline.py

  # ── Seed (manuel ou debug) ───────────────────────────────
  seed:
    build: .
    container_name: healthai-seed
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: healthai
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai
    command: python database/seed.py --truncate

  # ── Apache Airflow ──────────────────────────────────────
  airflow:
    image: apache/airflow:2.9.1
    container_name: healthai-airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://healthai:healthai@postgres:5432/healthai
      AIRFLOW__CORE__FERNET_KEY: "myfernetkey"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/app
    ports:
      - "8080:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@admin.com &&
      airflow scheduler & airflow webserver
      "

volumes:
  postgres_data: