version: "3.9"

services:

  # ── Base de données ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: healthai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       healthai
      POSTGRES_USER:     healthai
      POSTGRES_PASSWORD: healthai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/api_schema.sql:/docker-entrypoint-initdb.d/02_api_schema.sql:ro
      - ./database/03_seed_admin.sql:/docker-entrypoint-initdb.d/03_seed_admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthai -d healthai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Pipeline ETL (génère les CSV) ────────────────────────
  pipeline:
    build: .
    container_name: healthai-pipeline
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      PYTHONPATH: /app
    command: python scripts/run_pipeline.py

  # ── Seed (CSV → PostgreSQL) ──────────────────────────────
  seed:
    build: .
    container_name: healthai-seed
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      PYTHONPATH:        /app
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       healthai
      POSTGRES_USER:     healthai
      POSTGRES_PASSWORD: healthai
    command: python database/seed.py --truncate

volumes:
  postgres_data:
