      summary: Lister les enregistrements de consommation
      description: |
        - **Admin** : toutes les entrées avec données nutritionnelles jointes.
        - **User** : uniquement ses propres entrées (filtré par `healthId`).
      responses:
        '200':
          description: Liste des consommations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Consommation'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Consommation]
      summary: Enregistrer une consommation (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsommationCreate'
      responses:
        '201':
          description: Consommation enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consommation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /consommation/{id_consumption}:
    get:
      tags: [Consommation]
      summary: Détail d'une consommation
      parameters:
        - name: id_consumption
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Consommation trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consommation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Consommation]
      summary: Modifier une consommation (admin)
      parameters:
        - name: id_consumption
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsommationCreate'
      responses:
        '200':
          description: Consommation mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consommation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Consommation]
      summary: Supprimer une consommation (admin)
      parameters:
        - name: id_consumption
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Consommation supprimée
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════════════════════════════════════
  # ANALYTIQUES
  # ════════════════════════════════════════════════════════════════════════════

  /analytics/kpi:
    get:
      tags: [Analytiques]
      summary: Indicateurs clés par utilisateur (v_kpi_dashboard)
      description: |
        Agrège les métriques clés par profil. Lecture seule.
        - **Admin** : tous les profils.
        - **User** : son propre profil uniquement.
      responses:
        '200':
          description: KPIs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KpiRow'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/profil:
    get:
      tags: [Analytiques]
      summary: Profils de santé enrichis (v_profil_utilisateur)
      description: Données biométriques et statistiques d'activité par utilisateur.
      responses:
        '200':
          description: Profils
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    user_id:
                      type: integer
                    age:
                      type: integer
                    gender:
                      type: string
                    experience_level:
                      type: integer
                    weight_kg:
                      type: number
                    height_m:
                      type: number
                    bmi_calculated:
                      type: number
                    categorie_imc:
                      type: string
                    nb_seances:
                      type: integer
                    moy_calories_brulees:
                      type: number
                    moy_duree_seance_h:
                      type: number
                    total_steps:
                      type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/resume:
    get:
      tags: [Analytiques]
      summary: Résumé journalier activité + nutrition (v_resume_journalier)
      responses:
        '200':
          description: Résumés journaliers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    user_id:
                      type: integer
                    date:
                      type: string
                      format: date
                    workout_type:
                      type: string
                    steps:
                      type: integer
                    calories_burned:
                      type: number
                    session_duration_hours:
                      type: number
                    calories_consommees:
                      type: number
                    proteines_g:
                      type: number
                    glucides_g:
                      type: number
                    lipides_g:
                      type: number
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/bilan:
    get:
      tags: [Analytiques]
      summary: Bilan calorique déficit/excédent (v_bilan_calorique)
      responses:
        '200':
          description: Bilans caloriques par jour et par utilisateur
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BilanRow'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/apport:
    get:
      tags: [Analytiques]
      summary: Détail apport nutritionnel par repas (v_apport_nutritionnel)
      responses:
        '200':
          description: Apports nutritionnels détaillés
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    user_id:
                      type: integer
                    date:
                      type: string
                      format: date
                    repas_type:
                      type: string
                    food_item:
                      type: string
                    category:
                      type: string
                    quantite_grammes:
                      type: number
                    calories_total:
                      type: number
                    proteines_g:
                      type: number
                    glucides_g:
                      type: number
                    lipides_g:
                      type: number
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/intensite:
    get:
      tags: [Analytiques]
      summary: Intensité des séances d'activité (v_intensite_seance)
      responses:
        '200':
          description: Breakdown d'intensité par séance
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id_activity:
                      type: integer
                    user_id:
                      type: integer
                    date:
                      type: string
                      format: date
                    workout_type:
                      type: string
                    min_tres_actif:
                      type: number
                    min_modere:
                      type: number
                    min_leger:
                      type: number
                    min_sedentaire:
                      type: number
                    pct_actif:
                      type: number
        '401':
          $ref: '#/components/responses/Unauthorized'
